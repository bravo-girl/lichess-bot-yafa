name: Lichess Bot 24/7

on:
  schedule:
    - cron: '0 */5 * * *' # Startet alle 5 Stunden automatisch neu
  workflow_dispatch: # Erlaubt den manuellen Start per Klick

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - name: Code auschecken
      uses: actions/checkout@v4

    - name: Python einrichten
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Lichess-Bot-Framework installieren
      run: |
        git clone https://github.com framework
        cd framework
        pip install -r requirements.txt
        cp ../config.yml .
        cp ../yafa .
        chmod +x yafa

    - name: Bot starten (mit 5,5 Stunden Limit)
      env:
        LICHESS_BOT_TOKEN: ${{ secrets.LICHESS_TOKEN }}
      run: |
        cd framework
        timeout 19800 python3 lichess-bot.py || true
