name: Lichess Bot 24/7

on:
  schedule:
    - cron: '0 */4 * * *' # Versucht nun alle 4 Stunden (stündlich glatt) zu starten
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - name: Code auschecken
      uses: actions/checkout@v4

    - name: Python einrichten
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Lichess-Bot-Framework installieren
      run: |
        git clone https://github.com/ShailChoksi/lichess-bot.git framework
        cd framework
        pip install -r requirements.txt
        cp ../config.yml .
        cp ../yafa .
        chmod +x yafa

    - name: Bot starten (Sicheres Limit für 4-Stunden-Takt)
      env:
        LICHESS_BOT_TOKEN: ${{ secrets.LICHESS_TOKEN }}
      run: |
        cd framework
        # 13500 Sekunden = 3 Stunden und 45 Uhr. 
        # Der Bot stoppt 15 Minuten BEVOR der nächste 4-Stunden-Cron zündet!
        timeout 13500 python3 lichess-bot.py || true
