name: Lichess Bot 24/7

on:
  workflow_dispatch:
  repository_dispatch:
    types: [restart-bot]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read

    steps:
    - name: Code auschecken
      uses: actions/checkout@v4
      with:
        lfs: true

    - name: Python einrichten
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Syzygy 3-4-5 Cache
      uses: actions/cache@v4
      id: syzygy-cache
      with:
        path: syzygy
        key: syzygy-3-4-5-sesse-v1

    - name: Syzygy 3-4-5 herunterladen
      if: steps.syzygy-cache.outputs.cache-hit != 'true'
      run: |
        mkdir -p syzygy
        wget --mirror --no-parent --no-directories -e robots=off \
          --accept "*.rtbw,*.rtbz" \
          --directory-prefix=syzygy \
          http://tablebase.sesse.net/syzygy/3-4-5/

    - name: Lichess-Bot-Framework installieren
      run: |
        git clone https://github.com/ShailChoksi/lichess-bot.git framework
        cd framework
        pip install -r requirements.txt
        cp ../config.yml .
        cp ../yafa .
        cp -r ../syzygy .
        chmod +x yafa

    - name: Token in config.yml einfügen
      env:
        LICHESS_BOT_TOKEN: ${{ secrets.LICHESS_TOKEN }}
      run: |
        # Ersetzt den Platzhalter-String durch den echten Token
        sed -i "s|\$LICHESS_BOT_TOKEN|${LICHESS_BOT_TOKEN}|g" framework/config.yml

    - name: Bot starten (3 Stunden 45 Minuten Schicht)
      run: |
        cd framework
        # WICHTIG: fängt NUR das reguläre Timeout (124) ab. Ein Abbruch bricht den Job ab!
        timeout 13500 python3 lichess-bot.py -v || [ $? -eq 124 ]

    - name: Automatischen Neustart triggern
      if: success()
      env:
        PAT_TOKEN: ${{ secrets.MY_PAT }}  # <-- PAT, nicht GITHUB_TOKEN!
      run: |
        curl -s -X POST \
          -H "Authorization: token ${PAT_TOKEN}" \
          -H "Accept: application/vnd.github.v3+json" \
          "https://api.github.com/repos/${{ github.repository }}/dispatches" \
          -d '{"event_type": "restart-bot"}'
