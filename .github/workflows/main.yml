name: Lichess Bot 24/7

on:
  workflow_dispatch: # Erlaubt den manuellen Start per Klick
  repository_dispatch:
    types: [restart-bot] # Erlaubt den automatischen Neustart

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - name: Code auschecken
      uses: actions/checkout@v4

    - name: Python einrichten
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Lichess-Bot-Framework installieren
      run: |
        git clone https://github.com framework
        cd framework
        pip install -r requirements.txt
        cp ../config.yml .
        cp ../yafa .
        chmod +x yafa

    - name: Bot starten (3 Stunden 45 Minuten Schicht)
      env:
        LICHESS_BOT_TOKEN: ${{ secrets.LICHESS_TOKEN }}
      run: |
        cd framework
        timeout 13500 python3 lichess-bot.py || true

    - name: Automatischen Neustart triggern
      if: always() # Wird auch ausgeführt, wenn der Bot per Timeout beendet wurde
      run: |
        curl -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
        -H "Accept: application/vnd.github.v3+json" \
        https://github.com{{ github.repository }}/dispatches \
        -d '{"event_type": "restart-bot"}'
