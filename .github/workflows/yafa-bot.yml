name: YAFA Bot 24/7

on:
  workflow_dispatch:
  repository_dispatch:
    types: [restart-yafa-bot]

concurrency:
  group: yafa-bot-main
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: YAFA Engine aus Release laden
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rm -f yafa
          gh release download yafa-engine-current \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern yafa \
            --clobber
          chmod +x yafa
          ./yafa bench 1 1 1 >/dev/null

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Syzygy 3-4-5 plus 6-men WDL Cache
        uses: actions/cache@v4
        id: syzygy-cache
        with:
          path: syzygy
          key: syzygy-3-4-5-plus-6men-wdl-selected-lichess-v1

      - name: Syzygy 3-4-5 plus selektive 6-men WDL herunterladen
        if: steps.syzygy-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p syzygy
          cd syzygy
          wget --mirror --no-parent --no-directories -e robots=off \
            --accept "*.rtbw" \
            https://tablebase.lichess.ovh/tables/standard/3-4-5-wdl/
          wget --mirror --no-parent --no-directories -e robots=off \
            --accept "*.rtbz" \
            https://tablebase.lichess.ovh/tables/standard/3-4-5-dtz/
          base="https://tablebase.lichess.ovh/tables/standard/6-wdl"
          files=(
            KRBvKRP.rtbw KRBPvKP.rtbw KRNvKNP.rtbw KRPvKRP.rtbw
            KRPvKPP.rtbw KRPPvKR.rtbw KRBvKPP.rtbw KRRBvKR.rtbw
            KRPPvKP.rtbw KPPPvKR.rtbw KRNvKPP.rtbw KNPPvKR.rtbw
            KRPPvKB.rtbw KRBPvKR.rtbw KRPvKBP.rtbw KRNPvKB.rtbw
            KRBPvKN.rtbw KRPPPvK.rtbw KRBPPvK.rtbw
            KBPPvKP.rtbw KQBPvKP.rtbw KQQBvKP.rtbw KBBvKPP.rtbw
            KBPvKNP.rtbw KQBvKQN.rtbw KNPPPvK.rtbw KQNPPvK.rtbw
            KQQBvKN.rtbw KQQBvKQ.rtbw KQQPvKN.rtbw KQPPvKB.rtbw
            KQPvKQP.rtbw KQPPPvK.rtbw KPPvKPP.rtbw KPPPPvK.rtbw
          )
          for file in "${files[@]}"; do
            wget --continue --tries=20 --timeout=60 --waitretry=10 "${base}/${file}"
          done

      - name: Syzygy 3-4-5 plus 6-men WDL pruefen
        run: |
          find syzygy -type f | wc -l
          du -sh syzygy
          size_mb=$(du -sm syzygy | cut -f1)
          echo "Syzygy cache size: ${size_mb} MiB"
          test "$size_mb" -lt 10000
          missing=0
          for file in \
            syzygy/KPvK.rtbw \
            syzygy/KPvK.rtbz \
            syzygy/KRvKR.rtbw \
            syzygy/KRvKR.rtbz \
            syzygy/KRBvKRP.rtbw \
            syzygy/KPPvKPP.rtbw
          do
            if [ ! -f "$file" ]; then
              echo "::error::Fehlende Syzygy-Datei: $file"
              missing=1
            fi
          done
          test "$missing" -eq 0

      - name: Lichess-Bot-Framework installieren
        run: |
          git clone https://github.com/ShailChoksi/lichess-bot.git framework
          cd framework
          python3 - <<'PY'
          from pathlib import Path

          lichess = Path("lib/lichess.py")
          text = lichess.read_text()
          text = text.replace(
              '    "takeback": "/api/bot/game/{}/takeback/{}",',
              '    "takeback": "/api/bot/game/{}/takeback/{}",\n'
              '    "draw": "/api/bot/game/{}/draw/{}",'
          )
          lichess.write_text(text)

          wrapper = Path("lib/engine_wrapper.py")
          text = wrapper.read_text()
          marker = "def check_for_draw_offer(game: model.Game) -> bool:\n"
          helper = '''OPPONENT_TB_TIMES = {}
          OPPONENT_LAST_CLOCK = {}
          OPPONENT_LAST_SAMPLE_PLY = {}
          GAME_CLOCK_STATS = {}


          def syzygy_says_draw(board: chess.Board) -> bool:
              """Return true if local Syzygy WDL proves the current position drawn."""
              if chess.popcount(board.occupied) > 6:
                  return False

              try:
                  with chess.syzygy.open_tablebase("syzygy") as tablebase:
                      return tablebase.probe_wdl(board) == 0
              except Exception as error:
                  logger.debug(f"Syzygy draw-offer probe failed: {error}")
                  return False


          def opponent_clock_ms(game: model.Game) -> int:
              clock_key = "wtime" if game.opponent_color == "white" else "btime"
              return int(game.state.get(clock_key, 0) or 0)


          def my_clock_ms(game: model.Game) -> int:
              clock_key = "btime" if game.opponent_color == "white" else "wtime"
              return int(game.state.get(clock_key, 0) or 0)


          def opponent_increment_ms(game: model.Game) -> int:
              increment_key = "winc" if game.opponent_color == "white" else "binc"
              return int(game.state.get(increment_key, 0) or 0)


          def my_increment_ms(game: model.Game) -> int:
              increment_key = "binc" if game.opponent_color == "white" else "winc"
              return int(game.state.get(increment_key, 0) or 0)


          def clock_stats(game: model.Game) -> dict:
              return GAME_CLOCK_STATS.setdefault(game.id, {
                  "ply": -1,
                  "my_clock": None,
                  "opponent_clock": None,
                  "my_times": [],
                  "opponent_times": [],
                  "lead_history": [],
                  "my_book_prefix": True,
                  "opponent_book_prefix": True,
              })


          def bounded_average(values: list[int]) -> int:
              if not values:
                  return 0
              return sum(values) // len(values)


          def remember_clock_stats(game: model.Game) -> None:
              """Track both clocks and ignore continuous sub-second opening-book replies."""
              stats = clock_stats(game)
              ply = len((game.state.get("moves") or "").split())
              if stats["ply"] == ply:
                  return

              current_my_clock = my_clock_ms(game)
              current_opponent_clock = opponent_clock_ms(game)
              previous_my_clock = stats["my_clock"]
              previous_opponent_clock = stats["opponent_clock"]
              stats["ply"] = ply
              stats["my_clock"] = current_my_clock
              stats["opponent_clock"] = current_opponent_clock
              stats["lead_history"].append(current_my_clock - current_opponent_clock)
              del stats["lead_history"][:-8]

              if previous_my_clock is not None:
                  used = max(0, previous_my_clock + my_increment_ms(game) - current_my_clock)
                  if used >= 1000 or not stats["my_book_prefix"]:
                      stats["my_book_prefix"] = False
                      if used <= 120000:
                          stats["my_times"].append(used)
                          del stats["my_times"][:-8]
                  elif ply > 24:
                      stats["my_book_prefix"] = False

              if previous_opponent_clock is not None:
                  used = max(0, previous_opponent_clock + opponent_increment_ms(game) - current_opponent_clock)
                  if used >= 1000 or not stats["opponent_book_prefix"]:
                      stats["opponent_book_prefix"] = False
                      if used <= 120000:
                          stats["opponent_times"].append(used)
                          del stats["opponent_times"][:-8]
                  elif ply > 24:
                      stats["opponent_book_prefix"] = False


          def favorable_no_increment_flagging_dynamics(game: model.Game) -> bool:
              """In 0+0 around 35s, avoid draw paths if YAFA is likely to outlast the opponent."""
              if opponent_increment_ms(game) != 0 or my_increment_ms(game) != 0:
                  return False

              remember_clock_stats(game)
              stats = clock_stats(game)
              my_time_ms = my_clock_ms(game)
              opponent_time_ms = opponent_clock_ms(game)
              lead = my_time_ms - opponent_time_ms

              if opponent_time_ms > 35000 or my_time_ms < 8000 or lead < 5000:
                  return False

              recent_my_times = stats["my_times"][-3:]
              recent_opponent_times = stats["opponent_times"][-3:]
              very_recent_my_times = stats["my_times"][-2:]
              very_recent_opponent_times = stats["opponent_times"][-2:]
              my_avg = bounded_average(recent_my_times)
              opponent_avg = bounded_average(recent_opponent_times)
              very_recent_my_avg = bounded_average(very_recent_my_times)
              very_recent_opponent_avg = bounded_average(very_recent_opponent_times)
              lead_history = stats["lead_history"][-4:]
              lead_improved = len(lead_history) >= 3 and lead_history[-1] >= lead_history[0] + 1500
              lead_stable_good = lead >= 10000 and len(lead_history) >= 2 and lead_history[-1] >= lead_history[-2] - 1000
              opponent_spends_more = len(recent_opponent_times) >= 2 and opponent_avg >= 1200 and (my_avg == 0 or opponent_avg >= my_avg + 700)
              opponent_currently_calculates = len(very_recent_opponent_times) >= 2 and very_recent_opponent_avg >= 1800 \
                  and (very_recent_my_avg == 0 or very_recent_opponent_avg >= very_recent_my_avg + 900)
              own_forfeit_unlikely = my_time_ms >= max(10000, 3 * max(1000, my_avg or 1000))

              return own_forfeit_unlikely and (lead >= 15000 or lead_improved or lead_stable_good or opponent_spends_more or opponent_currently_calculates)


          def no_increment_flagging_draw_refusal(game: model.Game) -> bool:
              """In 0+0, play on instead of accepting/offering draws when the opponent can flag."""
              if opponent_increment_ms(game) != 0 or my_increment_ms(game) != 0:
                  return False

              my_time = game.my_remaining_time()
              opponent_time = seconds(opponent_clock_ms(game) / 1000)
              return (my_time >= seconds(20) and opponent_time <= seconds(15) and my_time - opponent_time >= seconds(10)) \
                  or favorable_no_increment_flagging_dynamics(game)


          def remember_opponent_reply_time(game: model.Game, board: chess.Board) -> None:
              """Track opponent speed in tablebase-sized drawn endings."""
              if chess.popcount(board.occupied) > 6:
                  return

              ply = len((game.state.get("moves") or "").split())
              if OPPONENT_LAST_SAMPLE_PLY.get(game.id) == ply:
                  return

              current_clock = opponent_clock_ms(game)
              increment = opponent_increment_ms(game)
              previous_clock = OPPONENT_LAST_CLOCK.get(game.id)
              OPPONENT_LAST_CLOCK[game.id] = current_clock
              OPPONENT_LAST_SAMPLE_PLY[game.id] = ply

              if previous_clock is None:
                  return

              used = max(0, previous_clock + increment - current_clock)
              if used <= 120000:
                  times = OPPONENT_TB_TIMES.setdefault(game.id, [])
                  times.append(used)
                  del times[:-6]


          def opponent_looks_tb_fast(game: model.Game) -> bool:
              times = OPPONENT_TB_TIMES.get(game.id, [])
              if len(times) < 5:
                  return False

              increment = opponent_increment_ms(game)
              fast_limit = max(2500, min(5000, increment + 1200))
              recent = times[-5:]
              return sum(time_used <= fast_limit for time_used in recent) >= 4


          def trivial_syzygy_draw(board: chess.Board) -> bool:
              return chess.popcount(board.occupied) <= 3 or board.is_insufficient_material()


          def should_take_syzygy_draw(game: model.Game, board: chess.Board) -> bool:
              if not syzygy_says_draw(board):
                  return False

              remember_clock_stats(game)
              remember_opponent_reply_time(game, board)

              if no_increment_flagging_draw_refusal(game):
                  logger.info("Refusing draw: 0+0 flagging edge, play on for the clock.")
                  return False

              if trivial_syzygy_draw(board):
                  return True

              if game.my_remaining_time() <= seconds(15):
                  return True

              return opponent_looks_tb_fast(game)


          def accept_syzygy_draw_offer(li: lichess.Lichess, game: model.Game, board: chess.Board) -> bool:
              """Accept Syzygy-drawn offers only after the opponent also looks TB-aware."""
              if not check_for_draw_offer(game) or not syzygy_says_draw(board):
                  return False

              if not should_take_syzygy_draw(game, board):
                  logger.info("Postponed draw offer: Syzygy WDL is draw, but opponent is not replying TB-fast yet.")
                  return False

              response = li.session.post(f"{li.baseUrl}/api/bot/game/{game.id}/draw/yes", timeout=2)
              response.raise_for_status()
              logger.info("Accepted opponent draw offer: Syzygy WDL is draw and opponent also looks TB-aware.")
              return True


          '''
          text = text.replace(marker, helper + marker)
          marker = "        lichess_bot_tbs = engine_cfg.lichess_bot_tbs\n\n"
          draw_accept = (
              '        remember_clock_stats(game)\n\n'
              '        if accept_syzygy_draw_offer(li, game, board):\n'
              '            return\n\n'
          )
          text = text.replace(marker, marker + draw_accept)
          marker = "        # Heed min_time\n"
          draw_offer = (
              '        if (not best_move.resigned\n'
              '                and best_move.move is not None\n'
              '                and should_take_syzygy_draw(game, board)):\n'
              '            logger.info("Offering draw: Syzygy WDL is draw and opponent also looks TB-aware or risk is low.")\n'
              '            best_move.draw_offered = True\n\n'
          )
          text = text.replace(marker, draw_offer + marker)
          wrapper.write_text(text)
          PY
          pip install -r requirements.txt
          cp ../config.yml .
          cp ../yafa .
          ln -s ../syzygy syzygy
          chmod +x yafa

      - name: Token in config.yml einfuegen
        env:
          LICHESS_BOT_TOKEN: ${{ secrets.LICHESS_TOKEN }}
        run: |
          sed -i "s|\$LICHESS_BOT_TOKEN|${LICHESS_BOT_TOKEN}|g" framework/config.yml

      - name: Bot starten (3 Stunden 45 Minuten Schicht)
        run: |
          cd framework
          timeout 13500 python3 lichess-bot.py -v || [ $? -eq 124 ]

      - name: Automatischen Neustart triggern
        if: success()
        env:
          PAT_TOKEN: ${{ secrets.MY_PAT }}
        run: |
          curl -s -X POST \
            -H "Authorization: token ${PAT_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/dispatches" \
            -d '{"event_type": "restart-yafa-bot"}'
