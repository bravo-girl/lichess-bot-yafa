name: YAFA Bot 24/7

on:
  workflow_dispatch:
  repository_dispatch:
    types: [restart-yafa-bot]

concurrency:
  group: yafa-bot-main
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Syzygy 3-4-5 plus 6-men WDL Cache
        uses: actions/cache@v4
        id: syzygy-cache
        with:
          path: syzygy
          key: syzygy-3-4-5-plus-6men-wdl-selected-lichess-v1

      - name: Syzygy 3-4-5 plus selektive 6-men WDL herunterladen
        if: steps.syzygy-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p syzygy
          cd syzygy
          wget --mirror --no-parent --no-directories -e robots=off \
            --accept "*.rtbw" \
            https://tablebase.lichess.ovh/tables/standard/3-4-5-wdl/
          wget --mirror --no-parent --no-directories -e robots=off \
            --accept "*.rtbz" \
            https://tablebase.lichess.ovh/tables/standard/3-4-5-dtz/
          base="https://tablebase.lichess.ovh/tables/standard/6-wdl"
          files=(
            KRBvKRP.rtbw KRBPvKP.rtbw KRNvKNP.rtbw KRPvKRP.rtbw
            KRPvKPP.rtbw KRPPvKR.rtbw KRBvKPP.rtbw KRRBvKR.rtbw
            KRPPvKP.rtbw KPPPvKR.rtbw KRNvKPP.rtbw KNPPvKR.rtbw
            KRPPvKB.rtbw KRBPvKR.rtbw KRPvKBP.rtbw KRNPvKB.rtbw
            KRBPvKN.rtbw KRPPPvK.rtbw KRBPPvK.rtbw
            KBPPvKP.rtbw KQBPvKP.rtbw KQQBvKP.rtbw KBBvKPP.rtbw
            KBPvKNP.rtbw KQBvKQN.rtbw KNPPPvK.rtbw KQNPPvK.rtbw
            KQQBvKN.rtbw KQQBvKQ.rtbw KQQPvKN.rtbw KQPPvKB.rtbw
            KQPvKQP.rtbw KQPPPvK.rtbw KPPvKPP.rtbw KPPPPvK.rtbw
          )
          for file in "${files[@]}"; do
            wget --continue --tries=20 --timeout=60 --waitretry=10 "${base}/${file}"
          done

      - name: Syzygy 3-4-5 plus 6-men WDL pruefen
        run: |
          find syzygy -type f | wc -l
          du -sh syzygy
          size_mb=$(du -sm syzygy | cut -f1)
          test "$size_mb" -lt 9500
          test -f syzygy/KPvK.rtbw
          test -f syzygy/KPvK.rtbz
          test -f syzygy/KRBvKRP.rtbw
          test -f syzygy/KPPvKPP.rtbw

      - name: Lichess-Bot-Framework installieren
        run: |
          git clone https://github.com/ShailChoksi/lichess-bot.git framework
          cd framework
          pip install -r requirements.txt
          cp ../config.yml .
          cp ../yafa .
          cp -r ../syzygy .
          chmod +x yafa

      - name: Token in config.yml einfuegen
        env:
          LICHESS_BOT_TOKEN: ${{ secrets.LICHESS_TOKEN }}
        run: |
          sed -i "s|\$LICHESS_BOT_TOKEN|${LICHESS_BOT_TOKEN}|g" framework/config.yml

      - name: Bot starten (3 Stunden 45 Minuten Schicht)
        run: |
          cd framework
          timeout 13500 python3 lichess-bot.py -v || [ $? -eq 124 ]

      - name: Automatischen Neustart triggern
        if: success()
        env:
          PAT_TOKEN: ${{ secrets.MY_PAT }}
        run: |
          curl -s -X POST \
            -H "Authorization: token ${PAT_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/dispatches" \
            -d '{"event_type": "restart-yafa-bot"}'
