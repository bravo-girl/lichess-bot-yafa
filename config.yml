token: "$LICHESS_BOT_TOKEN"  # Platzhalter - wird per sed ersetzt ✅
url: "https://lichess.org"

matchmaking:
  allow_during_games: false
  challenge_timeout: 30
  block_list: []

engine:
  dir: "."
  name: "yafa"
  protocol: "uci"
  uci_options:
    Threads: 1
    Hash: 64
    Slow Mover: 125
    Opponent Think Bonus: 20
  ponder: true

challenge:
  accept_bot: true
  accept_human: false
  time_controls:
    - bullet
    - blitz
    - rapid
  modes:
    - rated
    - casual
  variants:
    - standard
